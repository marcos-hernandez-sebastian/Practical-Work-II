  <main>
    <section>
      <h2>Contact me</h2>
      <div class="box">
        <p>If you want to get in touch, please fill out this form or send me an email: mhdezzsebastian@gmail.com <p>

        <form action="#">
          <div class="form-group">
            <label for="nombre">Name</label>
            <input type="text" id="nombre" name="nombre" placeholder="Your name" required>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" placeholder="your@email.com" required>
          </div>

          <div class="form-group">
            <label for="asunto">Subject</label>
            <input type="text" id="asunto" name="asunto" placeholder="Message subject">
          </div>

          <div class="form-group">
            <label for="mensaje">Message</label>
            <textarea id="mensaje" name="mensaje" placeholder="Write your message here..." required></textarea>
          </div>

          <button type="submit">Send Message</button>
        </form>
      </div>
    </section>
  </main>
