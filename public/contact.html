  <main>
    <section>
      <h2>Contacto</h2>
      <div class="box">
        <p>¿Quieres ponerte en contacto conmigo? Rellena el siguiente formulario.</p>

        <!-- IMPORTANTE: este formulario es solo de maquetacion (HTML puro).
             No tiene ningun script ni "action" que envie o guarde los datos,
             tal y como exige el enunciado. El boton no realiza ninguna accion real. -->
        <form>
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
          </div>

          <div class="form-group">
            <label for="email">Correo electronico</label>
            <input type="email" id="email" name="email" placeholder="tu@email.com" required>
          </div>

          <div class="form-group">
            <label for="asunto">Asunto</label>
            <input type="text" id="asunto" name="asunto" placeholder="Asunto del mensaje">
          </div>

          <div class="form-group">
            <label for="mensaje">Mensaje</label>
            <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje aqui..." required></textarea>
          </div>

          <button type="button">Enviar</button>
        </form>
      </div>
    </section>
